name: HR-Bot CI Pipeline

on:
  push:
    branches: [ "main", "feat/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Lint Frontend
        working-directory: ./frontend
        run: pnpm run lint

      - name: Build Frontend
        working-directory: ./frontend
        run: pnpm run build

  backend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Prisma Generate
        working-directory: ./backend
        run: npx prisma generate

      - name: Lint Backend
        working-directory: ./backend
        run: npm run lint

      - name: Build Backend
        working-directory: ./backend
        run: npm run build
