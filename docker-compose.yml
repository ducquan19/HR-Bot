services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hrbot-postgres
    environment:
      POSTGRES_DB: hrbot
      POSTGRES_USER: hrbot
      POSTGRES_PASSWORD: hrbot
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrbot -d hrbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hrbot-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: hrbot-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: hrbot-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build: ./backend
    container_name: hrbot-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://hrbot:hrbot@postgres:5432/hrbot?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      MAIL_HOST: mailhog
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  livekit:
    image: livekit/livekit-server:latest
    container_name: hrbot-livekit
    command: '--dev --bind 0.0.0.0 --keys "devkey: devsecret"'
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

  ai-services:
    build: ./ai-services
    container_name: hrbot-ai-services
    env_file:
      - ./ai-services/.env
    environment:
      AGENT_MODE: interview
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: devsecret
      BACKEND_URL: http://backend:3000
      PYTHONUNBUFFERED: "1"
    depends_on:
      - livekit
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
